<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Proposal</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

/* BACKGROUND */

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
background: linear-gradient(135deg,#ffd6e8,#e6d6ff);
color:#333;
animation: fadeIn 1.5s ease;
}

/* HERO SECTION */

.hero{
position:relative;
z-index:2;
}

/* TITLE */

.title{
font-size:3rem;
font-weight:700;
color:#ff4f8b;
margin-bottom:10px;
}

/* SUBTITLE */

.subtitle{
font-size:1.2rem;
color:#555;
margin-bottom:40px;
}

/* ILLUSTRATION AREA */

.illustration{
width:250px;
height:250px;
margin:auto;
margin-bottom:40px;
}

/* Placeholder animation circle */

.couple{
width:100%;
height:100%;
border-radius:50%;
background: radial-gradient(circle,#ff9acb,#caa6ff);
animation: dance 3s ease-in-out infinite;
}

/* BUTTON */

.btn{
padding:15px 35px;
border:none;
border-radius:30px;
background:#ff4f8b;
color:white;
font-size:1.1rem;
cursor:pointer;
transition: all 0.3s ease;
}

/* BUTTON HOVER */

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 20px rgba(255,79,139,0.6);
}

/* HEART PARTICLES */

.heart{
position:absolute;
font-size:20px;
color:#ff4f8b;
animation: floatUp linear infinite;
}

/* ANIMATIONS */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes dance{
0%{transform:rotate(-5deg)}
50%{transform:rotate(5deg)}
100%{transform:rotate(-5deg)}
}

@keyframes floatUp{
0%{
transform:translateY(100vh) scale(0.5);
opacity:1;
}
100%{
transform:translateY(-10vh) scale(1.2);
opacity:0;
}
}

</style>
</head>

<body>

<div class="hero">

<h1 class="title">Dream Proposal</h1>

<p class="subtitle">
Create your magical proposal moment
</p>

<div class="illustration">
<div class="couple"></div>
</div>

<button class="btn">Start Creating</button>

</div>

<script>

/* HEART PARTICLE GENERATOR */

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*3+3)+"s";

heart.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
