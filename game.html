<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>How Well Do You Know Us? 🎯</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,500&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--red:#e63946;--pink:#ff6b9d;--dark:#2d1b2e}
    body{min-height:100vh;background:linear-gradient(160deg,#fff0f5 0%,#fce8ff 50%,#ffe8f0 100%);
      font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
    .wrap{max-width:560px;width:100%}
    header{text-align:center;margin-bottom:2rem;animation:fadeDown .7s both}
    @keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
    header h1{font-family:'Playfair Display',serif;font-size:clamp(1.7rem,4vw,2.4rem);color:var(--dark)}
    header h1 em{color:var(--red);font-style:italic}
    header p{color:#9a6070;font-style:italic;margin-top:.4rem}

    .quiz-card{background:rgba(255,255,255,.68);backdrop-filter:blur(18px);
      border:2px solid rgba(255,255,255,.85);border-radius:2rem;padding:2.5rem;
      box-shadow:0 12px 50px rgba(230,57,70,.12);animation:popIn .6s cubic-bezier(.22,1,.36,1) both}
    @keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}

    .progress{height:6px;background:rgba(230,57,70,.1);border-radius:3px;margin-bottom:2rem;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(to right,var(--pink),var(--red));border-radius:3px;transition:width .5s ease}
    .q-label{font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;color:var(--pink);margin-bottom:.8rem;font-weight:700}
    .q-text{font-family:'Playfair Display',serif;font-size:clamp(1.2rem,3vw,1.6rem);color:var(--dark);margin-bottom:2rem;line-height:1.3}
    .options{display:flex;flex-direction:column;gap:.75rem}
    .opt{padding:.85rem 1.2rem;background:rgba(255,255,255,.7);border:2px solid rgba(230,57,70,.12);
      border-radius:1rem;font-family:'Nunito',sans-serif;font-size:.97rem;color:var(--dark);
      cursor:pointer;text-align:left;transition:border-color .2s,background .2s,transform .15s}
    .opt:hover:not(:disabled){border-color:var(--pink);background:rgba(255,107,157,.08);transform:translateX(4px)}
    .opt.correct{border-color:#27ae60;background:rgba(39,174,96,.1)}
    .opt.wrong{border-color:var(--red);background:rgba(230,57,70,.08)}
    .opt:disabled{cursor:default}
    .feedback{margin-top:1.2rem;padding:1rem 1.2rem;border-radius:1rem;
      background:rgba(255,107,157,.1);border:1.5px solid rgba(255,107,157,.25);
      font-style:italic;color:#7a3050;font-size:.95rem;line-height:1.5;
      display:none;animation:slideUp .3s ease}
    @keyframes slideUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .feedback.show{display:block}
    .next-btn{margin-top:1.5rem;width:100%;padding:.9rem;
      background:linear-gradient(135deg,var(--pink),var(--red));color:#fff;
      font-family:'Playfair Display',serif;font-size:1rem;font-style:italic;
      border:none;border-radius:1rem;cursor:pointer;
      box-shadow:0 4px 18px rgba(230,57,70,.3);transition:transform .2s;display:none}
    .next-btn.show{display:block}
    .next-btn:hover{transform:translateY(-2px)}

    .score-screen{text-align:center;display:none;padding:1rem}
    .score-screen.show{display:block}
    .big-emoji{font-size:4rem;display:block;margin-bottom:1rem;animation:bounce 1s ease-in-out infinite}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    .score-screen h2{font-family:'Playfair Display',serif;font-size:2rem;color:var(--dark);margin-bottom:.5rem}
    .score-screen h2 em{color:var(--red);font-style:italic}
    .score-screen p{color:#8a5060;font-style:italic;margin-bottom:2rem}
    .score-actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
    .score-actions a,.score-actions button{padding:.9rem 2rem;border-radius:100px;
      font-family:'Playfair Display',serif;font-size:1rem;font-style:italic;
      cursor:pointer;text-decoration:none;transition:transform .2s}
    .score-actions a{background:linear-gradient(135deg,var(--pink),var(--red));color:#fff;
      box-shadow:0 4px 18px rgba(230,57,70,.35)}
    .score-actions button{background:rgba(255,255,255,.7);border:2px solid rgba(230,57,70,.2);color:var(--red)}
    .score-actions a:hover,.score-actions button:hover{transform:translateY(-2px)}
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>How Well Do You <em>Know Us?</em></h1>
    <p>3 questions. No cheating. Okay maybe a little. 😏</p>
  </header>
  <div class="quiz-card" id="quizCard">
    <div class="progress"><div class="progress-fill" id="pFill"></div></div>
    <div class="q-label" id="qLabel"></div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="opts"></div>
    <div class="feedback" id="fb"></div>
    <button class="next-btn" id="nextBtn">Next →</button>
  </div>
  <div class="score-screen" id="scoreSc">
    <span class="big-emoji" id="scEmoji">🎉</span>
    <h2 id="scTitle"></h2>
    <p id="scMsg"></p>
    <div class="score-actions">
      <button onclick="restart()">Try Again 🔄</button>
      <a href="heartcatch.html" id="nextPageLink">Next Challenge 💕</a>
    </div>
  </div>
</div>
<script src="shared.js"></script>
<script>
  let qs=loadData().quiz, cur=0, score=0, answered=false;

  function renderQ(){
    const q=qs[cur];
    document.getElementById('qLabel').textContent=`Question ${cur+1} of ${qs.length}`;
    document.getElementById('qText').textContent=q.q;
    document.getElementById('pFill').style.width=`${(cur/qs.length)*100}%`;
    document.getElementById('fb').className='feedback';
    document.getElementById('nextBtn').className='next-btn';
    answered=false;
    const opts=document.getElementById('opts'); opts.innerHTML='';
    q.opts.forEach((o,i)=>{
      const btn=document.createElement('button');
      btn.className='opt';btn.textContent=o;
      btn.addEventListener('click',()=>pick(i));
      opts.appendChild(btn);
    });
  }

  function pick(idx){
    if(answered)return; answered=true;
    const q=qs[cur];
    document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
    document.querySelectorAll('.opt')[idx].classList.add(idx===q.correct?'correct':'wrong');
    if(idx!==q.correct)document.querySelectorAll('.opt')[q.correct].classList.add('correct');
    if(idx===q.correct)score++;
    const fb=document.getElementById('fb');
    fb.textContent=idx===q.correct?q.ok:q.fail;
    fb.className='feedback show';
    const nb=document.getElementById('nextBtn');
    nb.textContent=cur<qs.length-1?'Next Question →':'See My Score 🎉';
    nb.className='next-btn show';
  }

  document.getElementById('nextBtn').addEventListener('click',()=>{
    if(cur<qs.length-1){cur++;renderQ();}else showScore();
  });

  function showScore(){
    document.getElementById('quizCard').style.display='none';
    const ss=document.getElementById('scoreSc'); ss.className='score-screen show';
    const p=score/qs.length;
    document.getElementById('scEmoji').textContent=p===1?'💕':p>=.6?'😌':'💀';
    document.getElementById('scTitle').innerHTML=p===1?'Perfect <em>Score!</em>':p>=.6?'Not <em>bad...</em>':'Oh <em>no...</em>';
    document.getElementById('scMsg').textContent=p===1?`You actually know us! Let's go catch some hearts 💕`
      :p>=.6?`${score}/${qs.length}... Not bad! Hearts await!`
      :`${score}/${qs.length}?? Go catch some hearts to redeem yourself 💀`;
  }

  function restart(){cur=0;score=0;
    document.getElementById('quizCard').style.display='block';
    document.getElementById('scoreSc').className='score-screen';renderQ();}
  window.restart=restart;

  renderQ();
</script>
</body>
</html>
