<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>It's a Date! 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,500&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--red:#e63946;--pink:#ff6b9d;--dark:#2d1b2e}
    body{min-height:100vh;background:linear-gradient(160deg,#fff0f5 0%,#fce8ff 50%,#ffe8f0 100%);
      font-family:'Nunito',sans-serif;padding:3rem 1rem 4rem;
      position:relative;overflow-x:hidden;text-align:center}
    canvas{position:fixed;inset:0;pointer-events:none;z-index:0}

    /* NO BOX — floats freely */
    .content{position:relative;z-index:10;max-width:580px;margin:0 auto;
      animation:popIn .9s cubic-bezier(.22,1,.36,1) both}
    @keyframes popIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

    .conf-emoji{font-size:3.5rem;display:block;margin-bottom:1.2rem;
      animation:spinBounce 3s ease-in-out infinite}
    @keyframes spinBounce{0%,100%{transform:rotate(-8deg)scale(1)}50%{transform:rotate(8deg)scale(1.12)}}

    h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3rem);
      color:var(--dark);margin-bottom:.5rem;
      text-shadow:0 2px 20px rgba(255,255,255,.7)}
    h1 em{color:var(--red);font-style:italic}

    .sub{font-style:italic;color:#7a4050;font-size:1.1rem;margin-bottom:1.5rem;line-height:1.6;
      text-shadow:0 1px 10px rgba(255,255,255,.6)}

    .contract{display:inline-block;margin:0 auto 2.5rem;
      background:rgba(255,255,255,.45);backdrop-filter:blur(10px);
      border:1.5px dashed rgba(230,57,70,.25);border-radius:1.5rem;
      padding:1.2rem 2rem;font-style:italic;color:#8a5060;font-size:.9rem;line-height:1.9;
      text-align:left;box-shadow:0 4px 20px rgba(230,57,70,.08)}
    .contract strong{color:var(--red);font-style:normal}

    /* memories */
    .mem-section{margin-bottom:2.5rem;animation:fadeUp .7s .3s both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .mem-section h2{font-family:'Playfair Display',serif;font-size:1.5rem;
      color:var(--dark);margin-bottom:1.2rem;text-shadow:0 2px 10px rgba(255,255,255,.6)}
    .mem-section h2 em{color:var(--red);font-style:italic}
    .mem-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;max-width:400px;margin:0 auto}
    @media(max-width:400px){.mem-grid{grid-template-columns:1fr}}
    .mem-thumb{background:linear-gradient(135deg,#ffd6e8,#e8d5ff);border-radius:1.2rem;
      overflow:hidden;aspect-ratio:1;display:flex;align-items:center;justify-content:center;
      font-size:1.8rem;border:2px solid rgba(255,255,255,.85);
      box-shadow:0 4px 16px rgba(230,57,70,.1);transition:transform .3s}
    .mem-thumb:hover{transform:scale(1.06)}
    .mem-thumb img{width:100%;height:100%;object-fit:cover}

    /* actions */
    .actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;
      animation:fadeUp .7s .5s both;margin-bottom:2rem}
    .actions a{padding:.9rem 2rem;border-radius:100px;font-family:'Playfair Display',serif;
      font-size:1rem;font-style:italic;cursor:pointer;text-decoration:none;transition:transform .2s}
    .btn-p{background:linear-gradient(135deg,var(--pink),var(--red));color:#fff;
      box-shadow:0 4px 18px rgba(230,57,70,.35)}
    .btn-s{background:rgba(255,255,255,.7);border:2px solid rgba(230,57,70,.2);color:var(--red)}
    .actions a:hover{transform:translateY(-2px)}

    /* creator customize panel */
    .cust-panel{display:none;max-width:480px;margin:0 auto;padding:1.5rem;
      background:rgba(255,255,255,.6);backdrop-filter:blur(12px);
      border:1.5px solid rgba(255,255,255,.8);border-radius:1.5rem;
      box-shadow:0 8px 30px rgba(230,57,70,.1);text-align:left}
    .cust-panel.show{display:block}
    .cust-panel h3{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--dark);margin-bottom:1rem}
    .cust-panel label{display:block;font-size:.82rem;color:#6a3030;font-style:italic;margin-bottom:.25rem;margin-top:.7rem}
    .cust-panel input,.cust-panel textarea{width:100%;padding:.65rem 1rem;
      border:1.5px solid rgba(230,57,70,.18);border-radius:.8rem;
      font-family:'Nunito',sans-serif;font-size:.93rem;color:var(--dark);
      background:rgba(255,255,255,.7);outline:none;resize:none;margin-bottom:.3rem}
    .cust-panel input:focus,.cust-panel textarea:focus{border-color:var(--pink)}
    .save-cust{width:100%;margin-top:.8rem;padding:.85rem;
      background:linear-gradient(135deg,var(--pink),var(--red));color:#fff;
      font-family:'Playfair Display',serif;font-size:1rem;font-style:italic;
      border:none;border-radius:1rem;cursor:pointer;
      box-shadow:0 4px 16px rgba(230,57,70,.3)}
    .cust-toggle{background:none;border:1.5px solid rgba(230,57,70,.25);
      border-radius:100px;padding:.45rem 1.2rem;font-size:.82rem;color:var(--red);
      cursor:pointer;font-family:'Nunito',sans-serif;margin-bottom:1rem;
      background:rgba(255,255,255,.6)}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="content">
    <span class="conf-emoji">🎉</span>
    <h1 id="line1">Well well <em>well...</em></h1>
    <p class="sub" id="line2">Looks like it's a date. 💕</p>
    <div class="contract" id="contractBox">
      <strong>§1.</strong> You have successfully signed a lifetime contract.<br/>
      <strong>§2.</strong> No refunds. No returns. No exchanges.<br/>
      <strong>§3.</strong> Chaos is now a shared responsibility. 💀
    </div>

    <div class="mem-section">
      <h2>Look how far we've <em>come</em> 📸</h2>
      <div class="mem-grid" id="memGrid"></div>
    </div>

    <div class="actions">
      <a href="index.html" class="btn-s" id="backBtn">← Start Over</a>
      <a href="#" class="btn-p" onclick="window.print()">Save This 🌸</a>
    </div>

    <!-- creator only -->
    <div id="creatorSection">
      <button class="cust-toggle" onclick="toggleCust()">✏️ Customize Ending</button>
      <div class="cust-panel" id="custPanel">
        <h3>Customize Ending 🎉</h3>
        <label>Big title</label>
        <input type="text" id="cLine1" placeholder='e.g. "Well well well..."'/>
        <label>Subtitle</label>
        <input type="text" id="cLine2" placeholder='e.g. "Looks like it&apos;s a date."'/>
        <label>Contract funny lines (one per line)</label>
        <textarea rows="4" id="cFunny" placeholder="§1. You have successfully signed...&#10;§2. No refunds."></textarea>
        <button class="save-cust" onclick="saveCust()">Save ✅</button>
      </div>
    </div>
  </div>

  <script src="shared.js"></script>
  <script>
    // load ending data
    const d=loadData();
    if(d.ending){
      if(d.ending.line1) document.getElementById('line1').innerHTML=d.ending.line1;
      if(d.ending.line2) document.getElementById('line2').textContent=d.ending.line2;
      if(d.ending.funny){
        const lines=d.ending.funny.split('\n').filter(Boolean);
        if(lines.length){
          document.getElementById('contractBox').innerHTML=lines.map((l,i)=>`<strong>§${i+1}.</strong> ${l}<br/>`).join('');
        }
      }
    }

    // hide creator section for viewers
    if(isViewer()){
      document.getElementById('creatorSection').style.display='none';
      document.getElementById('backBtn').style.display='none';
    }

    // memories
    const mems=d.memories||[];
    const grid=document.getElementById('memGrid');
    const emojis=['📍','⚡','🫂'];
    for(let i=0;i<3;i++){
      const m=mems[i];
      const div=document.createElement('div');div.className='mem-thumb';
      if(m&&m.photo)div.innerHTML=`<img src="${m.photo}" alt="Memory ${i+1}"/>`;
      else div.textContent=emojis[i];
      grid.appendChild(div);
    }

    // customize
    function toggleCust(){
      document.getElementById('custPanel').classList.toggle('show');
      const d2=loadData();
      document.getElementById('cLine1').value=d2.ending?.line1||'';
      document.getElementById('cLine2').value=d2.ending?.line2||'';
      document.getElementById('cFunny').value=d2.ending?.funny||'';
    }
    function saveCust(){
      const d2=loadData();
      d2.ending=d2.ending||{};
      d2.ending.line1=document.getElementById('cLine1').value||d2.ending.line1;
      d2.ending.line2=document.getElementById('cLine2').value||d2.ending.line2;
      d2.ending.funny=document.getElementById('cFunny').value||d2.ending.funny;
      saveData(d2);
      if(d2.ending.line1)document.getElementById('line1').innerHTML=d2.ending.line1;
      if(d2.ending.line2)document.getElementById('line2').textContent=d2.ending.line2;
      if(d2.ending.funny){
        const lines=d2.ending.funny.split('\n').filter(Boolean);
        if(lines.length)document.getElementById('contractBox').innerHTML=lines.map((l,i)=>`<strong>§${i+1}.</strong> ${l}<br/>`).join('');
      }
      document.getElementById('custPanel').classList.remove('show');
    }
    window.toggleCust=toggleCust;window.saveCust=saveCust;

    // confetti
    const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
    canvas.width=innerWidth;canvas.height=innerHeight;
    window.addEventListener('resize',()=>{canvas.width=innerWidth;canvas.height=innerHeight;});
    const C=['#e63946','#ff6b9d','#ffb3c6','#fff','#ffc8dd','#ffafcc'];
    let H=Array.from({length:28},()=>mk(true));
    function mk(init){return{x:Math.random()*canvas.width,y:init?Math.random()*canvas.height:-20,
      s:5+Math.random()*13,v:.5+Math.random()*1.1,d:(Math.random()-.5)*.6,
      o:.25+Math.random()*.4,w:Math.random()*Math.PI*2,c:C[Math.floor(Math.random()*C.length)]}}
    function dh(x,y,s,c,o){ctx.save();ctx.globalAlpha=o;ctx.fillStyle=c;ctx.beginPath();
      ctx.moveTo(x,y+s*.3);ctx.bezierCurveTo(x,y-s*.1,x-s,y-s*.1,x-s,y+s*.4);
      ctx.bezierCurveTo(x-s,y+s*.9,x,y+s*1.3,x,y+s*1.5);
      ctx.bezierCurveTo(x,y+s*1.3,x+s,y+s*.9,x+s,y+s*.4);
      ctx.bezierCurveTo(x+s,y-s*.1,x,y-s*.1,x,y+s*.3);ctx.fill();ctx.restore();}
    function loop(){ctx.clearRect(0,0,canvas.width,canvas.height);
      if(H.length<35&&Math.random()<.035)H.push(mk(false));
      H.forEach((h,i)=>{h.y+=h.v;h.x+=h.d+Math.sin(h.w)*.3;h.w+=.02;
        dh(h.x,h.y,h.s,h.c,h.o);if(h.y>canvas.height+30)H[i]=mk(false);});
      requestAnimationFrame(loop);}
    loop();
  </script>
</body>
</html>
